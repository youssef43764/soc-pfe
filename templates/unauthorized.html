<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>SOC AI — Accès refusé</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
:root{--bg:#07090f;--surf:#0c1018;--border:#1c2535;--text:#b8cce0;--muted:#3d5470;--p1:#ff2d55;--mono:'Share Tech Mono',monospace;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--mono);background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;}
.box{text-align:center;padding:48px;}
.code{font-size:5rem;color:var(--p1);line-height:1;margin-bottom:16px;}
h1{font-size:1.2rem;color:var(--text);margin-bottom:8px;}
p{color:var(--muted);font-size:.85rem;margin-bottom:24px;}
a{color:var(--p1);text-decoration:none;border:1px solid var(--p1);padding:8px 20px;border-radius:6px;font-size:.8rem;transition:all .15s;}
a:hover{background:#3d0d14;}
</style>
</head>
<body>
<div class="box">
  <div class="code">403</div>
  <h1>Accès refusé</h1>
  <p>Vous n'avez pas les permissions nécessaires pour accéder à cette page.</p>
  <a href="/">← Retour au dashboard</a>
</div>
</body>
</html>
